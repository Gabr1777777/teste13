<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil Neon</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* Tela de Entrada */
        #entry-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF4ZzRnd3Jicm9nZzRnd3Jicm9nZzRnd3Jicm9nZzRndyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vzKZWFUufrtm/giphy.gif') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        #enter-btn {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            color: #fff;
            background: linear-gradient(270deg, #00ff00, #ffffff, #00ff00);
            background-size: 600% 600%;
            animation: gradientAnim 3s ease infinite;
            box-shadow: 0 0 20px #00ff00;
        }

        @keyframes gradientAnim {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }

        /* Perfil Principal */
        #profile-content {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: #0a0a0a;
            position: relative;
        }

        /* Barra de Navegação */
        nav {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid #00ff00;
            display: flex;
            justify-content: center;
            padding: 15px;
            z-index: 100;
        }

        nav button {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }

        /* Áreas de Conteúdo */
        .content-section {
            display: none;
            flex: 1;
            padding: 40px;
            text-align: center;
            color: white;
            z-index: 10;
        }

        .active { display: block; }

        /* Sobre Mim - Efeito Escrevendo */
        #text-typing {
            font-size: 24px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Galeria Slide */
        .slider-container {
            width: 80%;
            max-width: 600px;
            margin: 0 auto;
            border: 4px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            position: relative;
            height: 400px;
            overflow: hidden;
        }

        .slider-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Música */
        #player-ui {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #00ff00;
            display: inline-block;
        }

        /* Chuva de corações */
        .heart {
            position: absolute;
            color: #00ff00;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 5;
        }

        @keyframes fall {
            to { transform: translateY(100vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="entry-screen">
        <button id="enter-btn" onclick="startApp()">ENTRAR</button>
    </div>

    <div id="profile-content">
        <nav>
            <button onclick="showSection('inicio')">Início</button>
            <button onclick="showSection('sobre')">Sobre Mim</button>
            <button onclick="showSection('galeria')">Galeria</button>
            <button onclick="showSection('musica')">Música</button>
        </nav>

        <div id="inicio" class="content-section active">
            <h1>Bem-vindo ao meu Perfil</h1>
            <p>Escolha uma opção no menu acima.</p>
        </div>

        <div id="sobre" class="content-section">
            <div id="text-typing"></div>
        </div>

        <div id="galeria" class="content-section">
            <div class="slider-container">
                <img src="https://picsum.photos/id/10/830/552" class="slide">
                <img src="https://picsum.photos/id/20/830/552" class="slide">
                <img src="https://picsum.photos/id/30/830/552" class="slide">
                <img src="https://picsum.photos/id/10/830/552" class="slide">
                <img src="https://picsum.photos/id/20/830/552" class="slide">
                <img src="https://picsum.photos/id/30/830/552" class="slide">
                <img src="https://picsum.photos/id/10/830/552" class="slide">
                <img src="https://picsum.photos/id/20/830/552" class="slide">
                <img src="https://picsum.photos/id/30/830/552" class="slide">
                <img src="https://picsum.photos/id/10/830/552" class="slide">
            </div>
        </div>

        <div id="musica" class="content-section">
            <div id="player-ui">
                <h3 id="track-name">A carregar...</h3>
                <p>Playlist Neon</p>
            </div>
        </div>
    </div>

    <script>
        const playlist = [
            { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
            { name: "The Sound of Silence – Rising to the Night", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" },
            { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=0yenl8sh&raw=1" }
        ];

        let currentTrack = 0;
        const audio = new Audio();
        let typingActive = false;

        function startApp() {
            document.getElementById('entry-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('entry-screen').style.display = 'none';
                document.getElementById('profile-content').style.display = 'flex';
                playMusic();
                startHearts();
            }, 1000);
        }

        function playMusic() {
            audio.src = playlist[currentTrack].url;
            document.getElementById('track-name').innerText = playlist[currentTrack].name;
            audio.play();
            audio.onended = () => {
                currentTrack = (currentTrack + 1) % playlist.length;
                playMusic();
            };
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            if(id === 'sobre' && !typingActive) {
                startTyping();
            }
            if(id === 'galeria') {
                startSlider();
            }
        }

        function startTyping() {
            typingActive = true;
            const text = "Olhe atentamente para o presente que você está construindo: ele deve se parecer com o futuro com o qual você está sonhando.";
            let i = 0;
            const container = document.getElementById('text-typing');
            container.innerHTML = "";
            function type() {
                if (i < text.length) {
                    container.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 50);
                }
            }
            type();
        }

        let slideIdx = 0;
        function startSlider() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(s => s.style.display = "none");
            slideIdx++;
            if (slideIdx > slides.length) slideIdx = 1;
            slides[slideIdx-1].style.display = "block";
            setTimeout(startSlider, 3000);
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '💚';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
