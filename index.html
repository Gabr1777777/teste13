<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Perfil Neon Corrigido</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Tela de Entrada com o GIF Verde */
        #entry-screen {
            position: fixed; width: 100%; height: 100%;
            background: url("https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF4ZzRnd3Jicm9nZzRnd3Jicm9nZzRnd3Jicm9nZzRndyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vzKZWFUufrtm/giphy.gif") center/cover;
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        #enter-btn {
            padding: 15px 40px; font-size: 20px; cursor: pointer; border-radius: 50px; border: none;
            background: linear-gradient(45deg, #00ff00, #fff); background-size: 200%;
            animation: flow 3s infinite; box-shadow: 0 0 20px #00ff00; font-weight: bold;
        }
        @keyframes flow { 0% {background-position: 0%;} 50% {background-position: 100%;} 100% {background-position: 0%;} }

        #profile-content { display: none; height: 100vh; position: relative; }

        /* Nav Bar */
        nav { 
            display: flex; justify-content: center; background: rgba(0,0,0,0.9); 
            padding: 15px; border-bottom: 2px solid #00ff00; 
        }
        nav button { 
            background: none; border: 1px solid #00ff00; color: #00ff00; 
            margin: 0 10px; padding: 8px 20px; cursor: pointer; border-radius: 5px;
        }

        /* Galeria Neon */
        #galeria-view {
            display: none; width: 500px; height: 350px; margin: 50px auto;
            border: 5px solid #00ff00; box-shadow: 0 0 15px #00ff00;
            position: relative; overflow: hidden;
        }
        .slide { width: 100%; height: 100%; object-fit: cover; display: none; }
        .active-slide { display: block; }

        /* Botões Slide */
        .btn-slide {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,255,0,0.3); border: none; color: white;
            padding: 10px; cursor: pointer; font-size: 20px;
        }
        .next { right: 0; } .prev { left: 0; }

        /* Corações */
        .heart { position: absolute; color: #00ff00; animation: fall 4s linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh); opacity: 0; } }
        
        .view { text-align: center; padding-top: 50px; }
        #sobre-view { font-size: 20px; padding: 20px; }
    </style>
</head>
<body>

<div id="entry-screen">
    <button id="enter-btn" onclick="entrar()">ENTRAR</button>
</div>

<div id="profile-content">
    <nav>
        <button onclick="show('inicio')">Início</button>
        <button onclick="show('sobre')">Sobre Mim</button>
        <button onclick="show('galeria')">Galeria</button>
        <button onclick="show('musica')">Música</button>
    </nav>

    <div id="inicio" class="view"><h1>Bem-vindo ao Perfil</h1></div>
    
    <div id="sobre" class="view" style="display:none"><div id="typing"></div></div>

    <div id="galeria" class="view" style="display:none">
        <div id="galeria-view">
            <img class="slide active-slide" src="https://i.imgur.com/a1pK0hL.jpg">
            <img class="slide" src="https://i.imgur.com/Jn2BfWl.jpg">
            <img class="slide" src="https://i.imgur.com/Q8TFcSx.jpg">
            <img class="slide" src="https://i.imgur.com/a1pK0hL.jpg">
            <img class="slide" src="https://i.imgur.com/Jn2BfWl.jpg">
            <img class="slide" src="https://i.imgur.com/Q8TFcSx.jpg">
            <img class="slide" src="https://i.imgur.com/a1pK0hL.jpg">
            <img class="slide" src="https://i.imgur.com/Jn2BfWl.jpg">
            <img class="slide" src="https://i.imgur.com/Q8TFcSx.jpg">
            <img class="slide" src="https://i.imgur.com/a1pK0hL.jpg">
            
            <button class="btn-slide prev" onclick="move(-1)">❮</button>
            <button class="btn-slide next" onclick="move(1)">❯</button>
        </div>
    </div>

    <div id="musica" class="view" style="display:none"><h2>Tocando Playlist Neon...</h2></div>
</div>

<script>
    const audio = new Audio();
    const playlist = [
        "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1",
        "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1"
    ];
    let trackIdx = 0;

    function entrar() {
        document.getElementById('entry-screen').style.display = 'none';
        document.getElementById('profile-content').style.display = 'block';
        playMusic();
        setInterval(createHeart, 300);
    }

    function playMusic() {
        audio.src = playlist[trackIdx];
        audio.play();
        audio.onended = () => { trackIdx = (trackIdx + 1) % playlist.length; playMusic(); };
    }

    function show(id) {
        ['inicio','sobre','galeria','musica'].forEach(v => document.getElementById(v).style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'sobre') startTyping();
    }

    function startTyping() {
        const txt = "Olhe atentamente para o presente que você está construindo: ele deve se parecer com o futuro com o qual você está sonhando.";
        let i = 0; document.getElementById('typing').innerHTML = "";
        function type() { if(i < txt.length) { document.getElementById('typing').innerHTML += txt.charAt(i); i++; setTimeout(type, 50); } }
        type();
    }

    let slideIdx = 0;
    function move(n) {
        const slides = document.getElementsByClassName('slide');
        slides[slideIdx].classList.remove('active-slide');
        slideIdx = (slideIdx + n + slides.length) % slides.length;
        slides[slideIdx].classList.add('active-slide');
    }

    function createHeart() {
        const h = document.createElement('div');
        h.className = 'heart'; h.innerHTML = '💚';
        h.style.left = Math.random() * 100 + 'vw';
        h.style.fontSize = Math.random() * 20 + 10 + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
    }
</script>
</body>
</html>
