<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Neon Atualizado</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #002200; 
            overflow: hidden;
            color: white;
            display: flex; /* Para layout de barra lateral */
        }

        /* TELA DE ENTRADA */
        #entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.imgur.com/YxLlfqT.gif') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #enter-btn {
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            color: #fff;
            text-transform: uppercase;
            background: linear-gradient(270deg, #00ff00, #ffffff, #00ff00);
            background-size: 600% 600%;
            animation: gradientAnim 3s ease infinite;
            box-shadow: 0 0 30px #00ff00;
            transition: 0.3s;
        }

        @keyframes gradientAnim {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }

        /* CONTEÚDO PRINCIPAL (Layout lateral) */
        #profile-content {
            display: none; /* Inicialmente oculto */
            width: 100%;
            height: 100vh;
            background-color: #002200;
            position: relative;
            display: flex; /* Barra lateral + Área de conteúdo */
        }

        /* BARRA LATERAL (Esquerda, vertical) */
        nav {
            width: 200px; /* Largura da barra lateral */
            background: rgba(0, 0, 0, 0.9);
            border-right: 2px solid #00ff00; /* Borda vertical */
            display: flex;
            flex-direction: column; /* Botões na vertical */
            align-items: center;
            padding: 30px 10px;
            z-index: 100;
            height: 100%; /* Ocupa altura total */
            box-sizing: border-box; /* Inclui padding na largura */
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px 20px;
            margin: 10px 0; /* Espaçamento vertical */
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%; /* Botões ocupam largura da nav */
            box-sizing: border-box;
            text-align: center;
        }

        .nav-btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }

        /* ÁREA DE CONTEÚDO (Direita) */
        #main-content {
            flex: 1; /* Ocupa o resto do espaço à direita */
            height: 100%;
            overflow-y: auto; /* Permite scroll se conteúdo for grande */
            position: relative;
        }

        .view {
            display: none; /* Oculto por padrão */
            padding: 50px;
            text-align: center;
            z-index: 10;
            height: 100%; /* Garante que ocupa altura total */
            box-sizing: border-box;
        }

        .active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; } /* Exibe como flex para centralizar conteúdo */

        /* INÍCIO */
        #inicio h1 {
            color:#00ff00; 
            font-size: 45px;
            margin-bottom: 20px;
        }

        /* PERFIL (Novo) */
        #perfil-view {
            display: none; /* Oculto por padrão */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            box-sizing: border-box;
            height: 100%;
        }

        /* Moldura Flutuante da Foto */
        .profile-pic-container {
            width: 200px;
            height: 200px;
            border: 5px solid #00ff00;
            border-radius: 50%; /* Foto redonda */
            box-shadow: 0 0 25px #00ff00;
            overflow: hidden;
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite; /* Efeito flutuante */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Lista de Detalhes do Perfil */
        .profile-details {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
            font-size: 18px;
            color: #ffffff;
            border: 1px solid #00ff00;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0, 34, 0, 0.5);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .profile-details li {
            margin-bottom: 10px;
        }

        .profile-details li strong {
            color: #00ff00;
            margin-right: 10px;
        }

        /* GALERIA */
        .galeria-container {
            width: 85%;
            max-width: 600px;
            height: 450px;
            margin: 0 auto;
            border: 4px solid #00ff00;
            box-shadow: 0 0 25px #00ff00;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #001100;
        }

        .slide {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 255, 0, 0.4);
            border: none;
            color: white;
            padding: 20px;
            cursor: pointer;
            font-size: 24px;
            z-index: 110;
        }

        .slide-btn:hover { background: #00ff00; color: #000; }
        .prev { left: 0; border-radius: 0 10px 10px 0; }
        .next { right: 0; border-radius: 10px 0 0 10px; }

        /* EFEITO ESCREVENDO */
        #typing-text {
            font-size: 24px;
            max-width: 800px;
            margin: 40px auto;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        /* CORAÇÕES */
        .heart {
            position: absolute;
            color: #00ff00;
            animation: fall linear forwards;
            text-shadow: 0 0 10px #00ff00;
            z-index: 5; /* Garante que os corações ficam sobre o conteúdo */
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* MÚSICA */
        #music-list {
            width: 80%;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div id="entry-screen">
        <button id="enter-btn" onclick="startApp()">Entrar</button>
    </div>

    <div id="profile-content">
        <nav>
            <button class="nav-btn" onclick="showSection('inicio')">Início</button>
            <button class="nav-btn" onclick="showSection('perfil')">Perfil</button>
            <button class="nav-btn" onclick="showSection('sobre')">Sobre Mim</button>
            <button class="nav-btn" onclick="showSection('galeria')">Galeria</button>
            <button class="nav-btn" onclick="showSection('musica')">Música</button>
        </nav>

        <div id="main-content">
            <div id="inicio" class="view active">
                <h1>Bem-vindo</h1>
                <p>Navegue pelas abas na barra lateral para conhecer meu perfil.</p>
            </div>

            <div id="perfil-view" class="view">
                <div class="profile-pic-container">
                    <img src="https://i.imgur.com/HCn75BA.jpeg" alt="Foto de Perfil" class="profile-pic">
                </div>
                <ul class="profile-details">
                    <li><strong>Signo:</strong> Peixes</li>
                    <li><strong>País:</strong> Brasil</li>
                    <li><strong>Idioma:</strong> Português</li>
                </ul>
            </div>

            <div id="sobre" class="view">
                <div id="typing-text"></div>
            </div>

            <div id="galeria" class="view">
                <div class="galeria-container">
                    <button class="slide-btn prev" onclick="changeSlide(-1)">❮</button>
                    <button class="slide-btn next" onclick="changeSlide(1)">❯</button>
                    
                    <img src="https://i.imgur.com/0h6IQIZ.jpeg" class="slide">
                    <img src="https://i.imgur.com/YDKnxJi.jpeg" class="slide">
                    <img src="https://i.imgur.com/LSZOs8Q.jpeg" class="slide">
                    <img src="https://i.imgur.com/BGULIuI.jpeg" class="slide">
                    <img src="https://i.imgur.com/HCn75BA.jpeg" class="slide">
                    <img src="https://i.imgur.com/QvXRzEF.jpeg" class="slide">
                </div>
            </div>

            <div id="musica" class="view">
                <h2 style="color: #00ff00;">Minha Playlist</h2>
                <div id="music-list"></div>
            </div>
        </div>
    </div>

    <script>
        const playlist = [
            { name: "Eminem - You dont know", url: "https://www.dropbox.com/scl/fi/4y0lc0fi24e9yavn17psv/Eminem-you-dont-know.mp3.mp3?rlkey=zicb6spgqe3pv0gqnz3xc24zo&st=wy1w0icm&raw=1" },
            { name: "The Sound of Silence – Rising to the Night", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=qty8093e&raw=1" },
            { name: "Desireless - Voyage Voyage", url: "https://www.dropbox.com/scl/fi/2y9zhx5zjsdxg3zljc2f9/sound-of-silence.mp3.mp3?rlkey=88zg0td3loy40uxmcm9rnk1jt&st=0yenl8sh&raw=1" }
        ];

        let currentTrack = 0;
        const audio = new Audio();
        let slideIdx = 0;

        function startApp() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('profile-content').style.display = 'flex'; // Exibe como flex para layout lateral
            playTrack(0);
            setInterval(createHeart, 300);
        }

        function playTrack(idx) {
            currentTrack = idx;
            audio.src = playlist[idx].url;
            audio.play();
            updateMusicUI();
            audio.onended = () => playTrack((currentTrack + 1) % playlist.length);
        }

        function updateMusicUI() {
            const list = document.getElementById('music-list');
            list.innerHTML = "";
            playlist.forEach((track, i) => {
                const div = document.createElement('div');
                div.style.padding = "10px";
                div.style.border = "1px solid #00ff00";
                div.style.margin = "10px";
                div.style.cursor = "pointer";
                div.style.borderRadius = "5px";
                if(i === currentTrack) div.style.background = "#00ff00", div.style.color = "#000";
                div.innerText = track.name;
                div.onclick = () => playTrack(i);
                list.appendChild(div);
            });
        }

        function showSection(id) {
            // Oculta todas as seções
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            
            // Exibe a seção selecionada
            if (id === 'perfil') {
                document.getElementById('perfil-view').classList.add('active');
            } else {
                document.getElementById(id).classList.add('active');
            }

            // Efeitos específicos
            if(id === 'sobre') typeEffect();
            if(id === 'galeria') showSlides(0);
        }

        function typeEffect() {
            const text = "Olhe atentamente para o presente que você está construindo: ele deve se parecer com o futuro com o qual você está sonhando.";
            const target = document.getElementById('typing-text');
            target.innerHTML = ""; let i = 0;
            function type() { if(i < text.length) { target.innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
            type();
        }

        function showSlides(n) {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(s => s.style.display = "none");
            slideIdx = (n + slides.length) % slides.length;
            slides[slideIdx].style.display = "block";
        }

        function changeSlide(n) { showSlides(slideIdx + n); }

        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = "💚"; h.className = "heart";
            h.style.left = Math.random() * 100 + "vw";
            h.style.top = "-50px";
            h.style.fontSize = Math.random() * 20 + 10 + "px";
            h.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
    </script>
</body>
</html>
